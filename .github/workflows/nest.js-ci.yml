name: NestJS CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  build:
    name: Build and Analyze NestJS Application

    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Display Node.js Version
        shell: powershell
        run: |
          node -v
          npm -v

      - name: Install Dependencies
        shell: powershell
        run: npm install

      - name: Build Application
        shell: powershell
        run: npm run build

      - name: Run Tests
        shell: powershell
        run: npm test

      - name: Install Sonar Scanner
        shell: powershell
        run: npm install -g @sonar/scan

      - name: Verify SonarQube Configuration
        shell: powershell
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SONAR_HOST_URL)) {
            Write-Error "SONAR_HOST_URL secret is missing."
            exit 1
          }

          Write-Host "SONAR_HOST_URL = $env:SONAR_HOST_URL"

          try {
            $response = Invoke-WebRequest -Uri "$env:SONAR_HOST_URL/api/server/version" -UseBasicParsing
            Write-Host "SonarQube Version: $($response.Content)"
          }
          catch {
            Write-Error $_
            exit 1
          }

      - name: SonarQube Scan
        shell: powershell
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          sonar `
            -D"sonar.host.url=$env:SONAR_HOST_URL" `
            -D"sonar.token=$env:SONAR_TOKEN" `
            -D"sonar.projectKey=nest-typescript-starter"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nestjs-build
          path: dist